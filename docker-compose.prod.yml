services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - backend-data:/app/data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DATABASE_PATH=/app/data/games.db
      - ENVIRONMENT=production
      - CORS_ORIGINS=${CORS_ORIGINS}
      - RATE_LIMIT_PER_HOUR=${RATE_LIMIT_PER_HOUR:-10}
      - RATE_LIMIT_PER_DAY=${RATE_LIMIT_PER_DAY:-30}
      - SESSION_SECRET=${SESSION_SECRET}
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

volumes:
  backend-data:

networks:
  app-network:
    driver: bridge
