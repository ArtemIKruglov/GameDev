<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Котик на крышах</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;width:100vw;touch-action:none;user-select:none}
canvas{display:block;border-radius:12px;box-shadow:0 0 40px rgba(0,200,255,.3)}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10;pointer-events:none}
#overlay.active{pointer-events:all}
.panel{background:linear-gradient(135deg,rgba(20,10,50,.95),rgba(40,20,80,.95));border:2px solid rgba(0,220,255,.4);border-radius:20px;padding:40px 50px;text-align:center;backdrop-filter:blur(10px);transform:scale(0);transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 60px rgba(0,180,255,.2),inset 0 0 30px rgba(0,180,255,.05)}
.panel.show{transform:scale(1)}
.panel h1{font-size:clamp(28px,6vw,48px);color:#fff;text-shadow:0 0 20px #00ddff,0 0 40px #00aaff;margin-bottom:8px}
.panel h2{font-size:clamp(20px,4vw,32px);color:#ff6b9d;text-shadow:0 0 15px #ff3d7f;margin-bottom:15px}
.panel p{color:rgba(255,255,255,.8);font-size:clamp(13px,2.5vw,17px);margin:6px 0;line-height:1.5}
.panel .emoji-big{font-size:clamp(48px,10vw,80px);margin:10px 0;animation:bounce 1s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.btn{display:inline-block;margin-top:20px;padding:14px 36px;font-size:clamp(16px,3vw,22px);font-weight:700;color:#fff;background:linear-gradient(135deg,#ff6b9d,#c44dff);border:none;border-radius:50px;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 25px rgba(196,77,255,.4);text-transform:uppercase;letter-spacing:1px}
.btn:hover{transform:scale(1.08);box-shadow:0 6px 35px rgba(196,77,255,.6)}
.btn:active{transform:scale(.95)}
.score-line{color:#ffe066;font-size:clamp(18px,3.5vw,26px);font-weight:700;text-shadow:0 0 10px #ffaa00;margin:5px 0}
.best-line{color:#00eeff;font-size:clamp(14px,2.5vw,18px);margin:5px 0}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="overlay" class="active">
<div id="startPanel" class="panel show">
<div class="emoji-big">🐱</div>
<h1>Котик на крышах</h1>
<h2>Собери 30 звёзд!</h2>
<p>Прыгай по крышам и собирай звёздочки ⭐</p>
<p>Остерегайся собак 🐕</p>
<p style="color:#00eeff;margin-top:12px">ПРОБЕЛ / ТАП — прыжок</p>
<p style="color:#00eeff">Двойной прыжок в воздухе!</p>
<button class="btn" onclick="startGame()">Играть!</button>
</div>
<div id="endPanel" class="panel">
<div class="emoji-big">😿</div>
<h2>Котик упал!</h2>
<div class="score-line" id="finalScore"></div>
<div class="best-line" id="bestScore"></div>
<button class="btn" onclick="startGame()">Ещё раз!</button>
</div>
<div id="winPanel" class="panel">
<div class="emoji-big">😻</div>
<h2>Ура! Победа!</h2>
<div class="score-line" id="winScore"></div>
<div class="best-line" id="winBest"></div>
<button class="btn" onclick="startGame()">Снова!</button>
</div>
</div>
<script>
const C=document.getElementById('game'),X=C.getContext('2d');
const overlay=document.getElementById('overlay');
const startP=document.getElementById('startPanel');
const endP=document.getElementById('endPanel');
const winP=document.getElementById('winPanel');
let W,H;
function resize(){W=C.width=Math.min(window.innerWidth,900);H=C.height=Math.min(window.innerHeight,650)}
resize();window.addEventListener('resize',resize);

let state='menu',score,bestScore=0,speed,cat={trail:[]},roofs=[],stars=[],enemies=[],particles=[],bgBuildings=[],shakeTimer,shakeX,shakeY,spawnTimer,diffTimer,groundY;

const GRAVITY=0.55,JUMP=-12.5,DOUBLE_JUMP=-10.5,ROOF_H_MIN=60,ROOF_H_MAX=200,WIN_SCORE=30;

function showPanel(p){
  startP.classList.remove('show');endP.classList.remove('show');winP.classList.remove('show');
  setTimeout(()=>p.classList.add('show'),50);
}

function startGame(){
  overlay.classList.remove('active');
  startP.classList.remove('show');endP.classList.remove('show');winP.classList.remove('show');
  state='play';score=0;speed=2.8;shakeTimer=0;shakeX=0;shakeY=0;spawnTimer=0;diffTimer=0;
  groundY=H-40;
  cat={x:120,y:groundY-30,vy:0,w:36,h:36,onGround:false,jumps:2,trail:[]};
  roofs=[];stars=[];enemies=[];particles=[];
  bgBuildings=[];
  for(let i=0;i<20;i++)bgBuildings.push({x:i*(W/8)+Math.random()*30,w:30+Math.random()*50,h:40+Math.random()*120,c:`hsl(${220+Math.random()*30},40%,${8+Math.random()*10}%)`});
  // начальные крыши
  roofs.push({x:-50,w:200,h:80,y:groundY-80,color:'#2a1545',windows:genWindows(200,80)});
  let lx=150;
  for(let i=0;i<8;i++){
    let rw=80+Math.random()*120,rh=ROOF_H_MIN+Math.random()*(ROOF_H_MAX-ROOF_H_MIN);
    let gap=50+Math.random()*70;
    lx+=rw/2+gap;
    roofs.push({x:lx,w:rw,h:rh,y:groundY-rh,color:roofColor(),windows:genWindows(rw,rh)});
    if(Math.random()<0.7)stars.push({x:lx+rw/2,y:groundY-rh-30,collected:false,t:0});
    if(Math.random()<0.25&&i>2)enemies.push({x:lx+rw/2-15,y:groundY-rh-30,w:30,h:30,vx:0.5+Math.random(),dir:1,roofIdx:roofs.length-1});
    lx+=rw/2;
  }
}

function roofColor(){const cs=['#1a0a3a','#2d1055','#0f1a4a','#1a2a3a','#2a0a2a','#0a2a2a'];return cs[Math.floor(Math.random()*cs.length)]}
function genWindows(rw,rh){let ws=[];for(let wx=8;wx<rw-12;wx+=18)for(let wy=12;wy<rh-10;wy+=20)if(Math.random()<0.5)ws.push({x:wx,y:wy,on:Math.random()<0.6});return ws}

function spawnParticles(px,py,col,count,spd){
  for(let i=0;i<count;i++){
    let a=Math.random()*Math.PI*2,s=Math.random()*spd+1;
    particles.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,col,size:2+Math.random()*3});
  }
}

function jump(){
  if(state!=='play')return;
  if(cat.jumps>0){
    cat.vy=cat.onGround?JUMP:DOUBLE_JUMP;
    cat.jumps--;
    cat.onGround=false;
    spawnParticles(cat.x+cat.w/2,cat.y+cat.h,'rgba(255,255,255,0.7)',6,2);
  }
}

// Управление
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();if(state==='menu')startGame();else jump();}});
C.addEventListener('mousedown',e=>{if(state==='menu')startGame();else jump()});
C.addEventListener('touchstart',e=>{e.preventDefault();if(state==='menu')startGame();else jump()},{passive:false});

function update(dt){
  if(state!=='play')return;
  diffTimer+=dt;
  if(diffTimer>5){diffTimer=0;speed=Math.min(speed+0.2,6.5)}
  // Гравитация
  cat.vy+=GRAVITY;
  cat.y+=cat.vy;
  cat.onGround=false;
  // След
  cat.trail.push({x:cat.x+cat.w/2,y:cat.y+cat.h/2,a:1});
  if(cat.trail.length>12)cat.trail.shift();
  cat.trail.forEach(t=>t.a-=0.08);
  // Коллизия с крышами
  for(let r of roofs){
    if(cat.vy>=0&&cat.x+cat.w-5>r.x&&cat.x+5<r.x+r.w&&cat.y+cat.h>=r.y&&cat.y+cat.h<=r.y+12){
      cat.y=r.y-cat.h;cat.vy=0;cat.onGround=true;cat.jumps=2;
    }
  }
  // Падение
  if(cat.y>H+50){gameOver();return}
  // Движение мира
  for(let r of roofs)r.x-=speed;
  for(let s of stars){if(!s.collected)s.x-=speed;s.t+=dt*3}
  for(let e of enemies){e.x-=speed;let r=roofs[e.roofIdx];if(r){e.x+=e.dir*e.vx;if(e.x<r.x+10||e.x+e.w>r.x+r.w-10)e.dir*=-1}}
  // Удаление старых
  roofs=roofs.filter(r=>r.x+r.w>-50);
  stars=stars.filter(s=>s.x>-50||s.collected);
  enemies=enemies.filter(e=>e.x>-50);
  // Генерация новых крыш
  let last=roofs[roofs.length-1];
  if(last&&last.x+last.w<W+100){
    let rw=80+Math.random()*120,rh=ROOF_H_MIN+Math.random()*(ROOF_H_MAX-ROOF_H_MIN);
    let gap=50+Math.random()*(60+speed*10);
    let nx=last.x+last.w+gap;
    roofs.push({x:nx,w:rw,h:rh,y:groundY-rh,color:roofColor(),windows:genWindows(rw,rh)});
    if(Math.random()<0.75)stars.push({x:nx+rw/2,y:groundY-rh-30,collected:false,t:0});
    if(Math.random()<0.3+speed*0.04)enemies.push({x:nx+rw/2-15,y:groundY-rh-30,w:30,h:30,vx:0.5+Math.random()*1.5,dir:1,roofIdx:roofs.length-1});
  }
  // Сбор звёзд
  for(let s of stars){
    if(!s.collected&&Math.abs(cat.x+cat.w/2-s.x)<28&&Math.abs(cat.y+cat.h/2-s.y)<28){
      s.collected=true;score++;
      spawnParticles(s.x,s.y,'#ffe066',12,4);
      shakeTimer=0.1;
      if(score>=WIN_SCORE){winGame();return}
    }
  }
  // Столкновение с врагами
  for(let e of enemies){
    if(cat.x+cat.w-5>e.x&&cat.x+5<e.x+e.w&&cat.y+cat.h-5>e.y&&cat.y+5<e.y+e.h){
      spawnParticles(cat.x+cat.w/2,cat.y+cat.h/2,'#ff4466',15,5);
      shakeTimer=0.3;gameOver();return;
    }
  }
  // Частицы
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.025;return p.life>0});
  // Тряска
  if(shakeTimer>0){shakeTimer-=dt;shakeX=(Math.random()-.5)*8;shakeY=(Math.random()-.5)*8}else{shakeX=0;shakeY=0}
  // Фон
  for(let b of bgBuildings){b.x-=speed*0.3;if(b.x+b.w<-10){b.x=W+Math.random()*100;b.h=40+Math.random()*120}}
}

function gameOver(){
  state='over';
  if(score>bestScore)bestScore=score;
  document.getElementById('finalScore').textContent='Звёзд: '+score+' ⭐';
  document.getElementById('bestScore').textContent='Рекорд: '+bestScore+' 🏆';
  overlay.classList.add('active');showPanel(endP);
}
function winGame(){
  state='win';
  if(score>bestScore)bestScore=score;
  document.getElementById('winScore').textContent='Звёзд: '+score+' ⭐';
  document.getElementById('winBest').textContent='Рекорд: '+bestScore+' 🏆';
  overlay.classList.add('active');showPanel(winP);
}

function draw(){
  X.save();X.translate(shakeX,shakeY);
  // Небо
  let sky=X.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#05051a');sky.addColorStop(0.5,'#0d1040');sky.addColorStop(1,'#1a0a3a');
  X.fillStyle=sky;X.fillRect(0,0,W,H);
  // Луна
  X.fillStyle='#fff8e0';X.shadowColor='#fff8e0';X.shadowBlur=40;
  X.beginPath();X.arc(W-100,80,35,0,Math.PI*2);X.fill();
  X.shadowBlur=0;
  // Фоновые здания
  for(let b of bgBuildings){X.fillStyle=b.c;X.fillRect(b.x,groundY-b.h,b.w,b.h+5)}
  // Фоновые звёзды
  X.fillStyle='rgba(255,255,255,0.5)';
  for(let i=0;i<30;i++){let sx=(i*137.5)%W,sy=(i*73.1)%(H*0.5);X.fillRect(sx,sy,1.5,1.5)}
  // Земля
  X.fillStyle='#0a0520';X.fillRect(0,groundY,W,H-groundY);
  // Крыши
  for(let r of roofs){
    X.fillStyle=r.color;
    X.fillRect(r.x,r.y,r.w,r.h);
    // Антенна
    X.fillStyle='#444';X.fillRect(r.x+r.w/2-2,r.y-15,4,15);
    X.fillStyle='#ff3333';X.beginPath();X.arc(r.x+r.w/2,r.y-15,3,0,Math.PI*2);X.fill();
    // Окна
    for(let win of r.windows){
      X.fillStyle=win.on?'#ffee88':'#222';
      X.shadowColor=win.on?'#ffee88':'transparent';X.shadowBlur=win.on?8:0;
      X.fillRect(r.x+win.x,r.y+win.y,8,10);
    }
    X.shadowBlur=0;
  }
  // Звёзды
  for(let s of stars){
    if(s.collected)continue;
    let bob=Math.sin(s.t)*4;
    X.font='26px serif';X.textAlign='center';
    X.shadowColor='#ffe066';X.shadowBlur=15;
    X.fillText('⭐',s.x,s.y+bob);
    X.shadowBlur=0;
  }
  // Враги
  for(let e of enemies){
    X.font='28px serif';X.textAlign='center';
    X.shadowColor='#ff4466';X.shadowBlur=10;
    X.fillText('🐕',e.x+e.w/2,e.y+e.h-2);
    X.shadowBlur=0;
  }
  // След котика
  for(let t of cat.trail){
    if(t.a<=0)continue;
    X.globalAlpha=t.a*0.3;X.fillStyle='#00eeff';
    X.beginPath();X.arc(t.x,t.y,4,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
  // Котик
  X.font='34px serif';X.textAlign='center';
  let catEmo=cat.vy<-2?'🐱':cat.vy>2?'😺':'🐱';
  X.shadowColor='#00ccff';X.shadowBlur=12;
  X.fillText(catEmo,cat.x+cat.w/2,cat.y+cat.h-2);
  X.shadowBlur=0;
  // Частицы
  for(let p of particles){
    X.globalAlpha=p.life;X.fillStyle=p.col;
    X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
  // HUD
  if(state==='play'){
    X.font='bold 24px sans-serif';X.textAlign='left';X.fillStyle='#ffe066';
    X.shadowColor='#ffaa00';X.shadowBlur=10;
    X.fillText('⭐ '+score+' / '+WIN_SCORE,15,35);
    X.shadowBlur=0;
    X.font='14px sans-serif';X.fillStyle='rgba(255,255,255,0.5)';
    X.fillText('Скорость: '+speed.toFixed(1),15,55);
  }
  X.restore();
}

let lastT=0;
function loop(t){
  let dt=Math.min((t-lastT)/1000,0.05);lastT=t;
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
