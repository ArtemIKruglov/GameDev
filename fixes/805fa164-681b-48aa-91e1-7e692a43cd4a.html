<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клавиатурный Шторм</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;width:100vw}
canvas{display:block;position:absolute;top:0;left:0}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#hud{display:none;padding:12px 20px;pointer-events:none}
.hud-row{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.hud-item{background:rgba(10,10,30,0.7);border:1px solid rgba(0,255,200,0.3);border-radius:12px;padding:6px 16px;color:#fff;font-size:18px;font-weight:700;backdrop-filter:blur(6px);white-space:nowrap}
.hud-item span{color:#00ffc8}
.lives{color:#ff3366!important}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(10,10,30,0.92);z-index:20;pointer-events:auto;transition:opacity 0.4s}
#overlay.hidden{opacity:0;pointer-events:none}
.title{font-size:clamp(32px,7vw,64px);font-weight:900;background:linear-gradient(135deg,#00ffc8,#7b2fff,#ff3366);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:8px;letter-spacing:2px}
.sub{color:rgba(255,255,255,0.6);font-size:clamp(14px,3vw,20px);margin-bottom:32px;text-align:center;max-width:80%}
.btn{background:linear-gradient(135deg,#00ffc8,#00b894);color:#0a0a1a;border:none;border-radius:16px;padding:14px 48px;font-size:clamp(16px,3vw,22px);font-weight:800;cursor:pointer;pointer-events:auto;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 0 30px rgba(0,255,200,0.3)}
.btn:hover{transform:scale(1.06);box-shadow:0 0 50px rgba(0,255,200,0.5)}
.btn:active{transform:scale(0.97)}
.stat{color:#fff;font-size:clamp(20px,4vw,32px);margin:8px 0;font-weight:700}
.stat b{color:#00ffc8}
.stat.best b{color:#ff3366}
.keys-hint{color:rgba(255,255,255,0.4);font-size:13px;margin-top:20px;text-align:center}
#combo-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:900;color:#ffe040;pointer-events:none;opacity:0;transition:none;text-shadow:0 0 20px rgba(255,224,64,0.6);z-index:15}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hud-row">
      <div class="hud-item">Счёт: <span id="score-val">0</span></div>
      <div class="hud-item">Комбо: <span id="combo-val">0</span>x</div>
      <div class="hud-item">Уровень: <span id="lvl-val">1</span></div>
      <div class="hud-item lives" id="lives-display"></div>
    </div>
  </div>
  <div id="combo-display"></div>
</div>
<div id="overlay">
  <div class="title">Клавиатурный Шторм</div>
  <div class="sub">Нажимай буквы на клавиатуре раньше, чем они упадут вниз! Буквы падают всё быстрее — успей все поймать!</div>
  <button class="btn" id="start-btn">Начать игру</button>
  <div class="keys-hint">Управление: клавиши A-Z или нажмите букву на экране</div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const hud=document.getElementById('hud');
const scoreEl=document.getElementById('score-val');
const comboEl=document.getElementById('combo-val');
const lvlEl=document.getElementById('lvl-val');
const livesEl=document.getElementById('lives-display');
const comboDisp=document.getElementById('combo-display');
const startBtn=document.getElementById('start-btn');

let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);

// Состояние игры
let state='menu'; // menu, play, over
let score=0, bestScore=0, combo=0, maxCombo=0, lives=5, level=1, gameTime=0;
let letters=[],particles=[],floatTexts=[];
let spawnTimer=0, spawnInterval=1.8;
let shakeX=0, shakeY=0, shakeDur=0;
let bgStars=[];
let lastTime=0;

// Фоновые звёзды
for(let i=0;i<120;i++){
  bgStars.push({x:Math.random()*2000,y:Math.random()*2000,s:Math.random()*1.8+0.3,sp:Math.random()*0.3+0.05,a:Math.random()*0.6+0.2});
}

const LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const COLORS=['#00ffc8','#7b2fff','#ff3366','#ffe040','#00aaff','#ff8800','#44ff88','#ff44cc'];

function randLetter(){return LETTERS[Math.floor(Math.random()*LETTERS.length)]}
function randColor(){return COLORS[Math.floor(Math.random()*COLORS.length)]}
function lerp(a,b,t){return a+(b-a)*t}

// Падающая буква
class FallingLetter{
  constructor(){
    this.ch=randLetter();
    this.col=randColor();
    this.x=60+Math.random()*(W-120);
    this.y=-40;
    this.speed=60+level*12+Math.random()*30;
    this.size=clamp(36+Math.random()*10,30,50);
    this.alpha=1;
    this.wobble=Math.random()*Math.PI*2;
    this.wobbleSpeed=1+Math.random()*2;
    this.wobbleAmp=8+Math.random()*12;
    this.glow=0.6+Math.random()*0.4;
    this.alive=true;
  }
  update(dt){
    this.y+=this.speed*dt;
    this.wobble+=this.wobbleSpeed*dt;
    if(this.y>H+20){this.alive=false;return true}// упала
    return false;
  }
  draw(){
    let wx=this.x+Math.sin(this.wobble)*this.wobbleAmp;
    ctx.save();
    ctx.globalAlpha=this.alpha;
    // Свечение
    ctx.shadowColor=this.col;
    ctx.shadowBlur=18*this.glow;
    ctx.font=`bold ${this.size}px 'Segoe UI',sans-serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillStyle=this.col;
    ctx.fillText(this.ch,wx,this.y);
    // Обводка
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,0.25)';
    ctx.lineWidth=1;
    ctx.strokeText(this.ch,wx,this.y);
    ctx.restore();
  }
}

function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}

// Частицы
class Particle{
  constructor(x,y,col){
    this.x=x;this.y=y;this.col=col;
    let angle=Math.random()*Math.PI*2;
    let speed=80+Math.random()*220;
    this.vx=Math.cos(angle)*speed;
    this.vy=Math.sin(angle)*speed-60;
    this.life=0.5+Math.random()*0.5;
    this.maxLife=this.life;
    this.size=2+Math.random()*4;
  }
  update(dt){
    this.x+=this.vx*dt;
    this.y+=this.vy*dt;
    this.vy+=300*dt;// гравитация
    this.life-=dt;
    return this.life<=0;
  }
  draw(){
    let a=clamp(this.life/this.maxLife,0,1);
    ctx.save();
    ctx.globalAlpha=a;
    ctx.fillStyle=this.col;
    ctx.shadowColor=this.col;
    ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*a,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// Всплывающий текст
class FloatText{
  constructor(x,y,text,col){
    this.x=x;this.y=y;this.text=text;this.col=col;
    this.life=1;this.maxLife=1;this.vy=-80;
  }
  update(dt){
    this.y+=this.vy*dt;
    this.life-=dt;
    return this.life<=0;
  }
  draw(){
    let a=clamp(this.life/this.maxLife,0,1);
    ctx.save();
    ctx.globalAlpha=a;
    ctx.fillStyle=this.col;
    ctx.shadowColor=this.col;
    ctx.shadowBlur=10;
    ctx.font='bold 24px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(this.text,this.x,this.y);
    ctx.restore();
  }
}

function spawnParticles(x,y,col,n){
  for(let i=0;i<n;i++) particles.push(new Particle(x,y,col));
}

function shake(dur){shakeDur=dur}

function showCombo(c){
  if(c<3)return;
  comboDisp.textContent=c+'x КОМБО!';
  comboDisp.style.opacity='1';
  comboDisp.style.transform='translate(-50%,-50%) scale(1.3)';
  setTimeout(()=>{comboDisp.style.transition='opacity 0.5s, transform 0.5s';comboDisp.style.opacity='0';comboDisp.style.transform='translate(-50%,-50%) scale(0.8)'},50);
  setTimeout(()=>{comboDisp.style.transition='none'},600);
}

function updateHUD(){
  scoreEl.textContent=score;
  comboEl.textContent=combo;
  lvlEl.textContent=level;
  let h='';
  for(let i=0;i<5;i++) h+=i<lives?'❤️':'🖤';
  livesEl.textContent=h;
}

function startGame(){
  state='play';
  score=0;combo=0;maxCombo=0;lives=5;level=1;gameTime=0;
  spawnTimer=0;spawnInterval=1.8;
  letters=[];particles=[];floatTexts=[];
  overlay.classList.add('hidden');
  hud.style.display='block';
  updateHUD();
  lastTime=performance.now();
}

function endGame(){
  state='over';
  if(score>bestScore)bestScore=score;
  hud.style.display='none';
  overlay.classList.remove('hidden');
  overlay.innerHTML=`
    <div class="title">Игра окончена</div>
    <div class="stat">Счёт: <b>${score}</b></div>
    <div class="stat best">Рекорд: <b>${bestScore}</b></div>
    <div class="stat">Макс. комбо: <b>${maxCombo}x</b></div>
    <div class="stat">Уровень: <b>${level}</b></div>
    <button class="btn" onclick="restartGame()">Играть снова</button>
    <div class="keys-hint">Нажми кнопку или Enter для перезапуска</div>
  `;
}

window.restartGame=function(){startGame()};

// Обработка нажатий
function handleKey(key){
  if(state==='over')return;
  if(state!=='play')return;
  let k=key.toUpperCase();
  if(k.length!==1||k<'A'||k>'Z')return;

  // Найти самую нижнюю подходящую букву
  let best=null,bestY=-1;
  for(let l of letters){
    if(l.ch===k&&l.y>bestY&&l.alive){best=l;bestY=l.y}
  }
  if(best){
    best.alive=false;
    let pts=10+combo*2;
    score+=pts;
    combo++;
    if(combo>maxCombo)maxCombo=combo;
    showCombo(combo);
    spawnParticles(best.x,best.y,best.col,12+combo*2);
    floatTexts.push(new FloatText(best.x,best.y-20,'+'+pts,best.col));
    if(combo>=5&&combo%5===0)shake(0.15);
    updateHUD();
  } else {
    // Промах
    combo=0;
    updateHUD();
  }
}

document.addEventListener('keydown',e=>{
  if(state==='menu')return;
  if(state==='over'){
    if(e.key==='Enter')restartGame();
    return;
  }
  handleKey(e.key);
});

// Тач-клавиатура: создаём виртуальные кнопки
let touchKeys=[];
let touchRow='QWERTYUIOPASDFGHJKLZXCVBNM';
let touchRows=['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
// Простая виртуальная клавиатура внизу для мобилок
function buildTouchKB(){
  let existing=document.getElementById('touch-kb');
  if(existing)existing.remove();
  let kb=document.createElement('div');
  kb.id='touch-kb';
  kb.style.cssText='position:fixed;bottom:0;left:0;width:100%;z-index:30;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px 10px;background:rgba(10,10,30,0.85);backdrop-filter:blur(8px);border-top:1px solid rgba(0,255,200,0.15)';
  let rows=['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
  for(let r of rows){
    let row=document.createElement('div');
    row.style.cssText='display:flex;gap:3px;justify-content:center';
    for(let ch of r){
      let b=document.createElement('button');
      b.textContent=ch;
      b.style.cssText='width:clamp(24px,8vw,36px);height:clamp(30px,8vw,40px);border:1px solid rgba(0,255,200,0.3);border-radius:8px;background:rgba(0,255,200,0.08);color:#00ffc8;font-size:clamp(11px,3vw,15px);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation';
      b.addEventListener('pointerdown',ev=>{ev.preventDefault();handleKey(ch);b.style.background='rgba(0,255,200,0.3)';setTimeout(()=>b.style.background='rgba(0,255,200,0.08)',100)});
      row.appendChild(b);
    }
    kb.appendChild(row);
  }
  document.body.appendChild(kb);
}
function showTouchKB(){
  if('ontouchstart' in window||navigator.maxTouchPoints>0){
    buildTouchKB();
  }
}
function hideTouchKB(){
  let kb=document.getElementById('touch-kb');
  if(kb)kb.remove();
}

startBtn.addEventListener('click',()=>{startGame();showTouchKB()});

// Главный цикл
function gameLoop(now){
  requestAnimationFrame(gameLoop);
  if(!lastTime)lastTime=now;
  let dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  // Рисуем фон
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);

  // Звёзды фона
  for(let s of bgStars){
    s.y+=s.sp*60*dt;
    if(s.y>H){s.y=0;s.x=Math.random()*W}
    ctx.fillStyle=`rgba(255,255,255,${s.a})`;
    ctx.beginPath();
    ctx.arc(s.x%W,s.y,s.s,0,Math.PI*2);
    ctx.fill();
  }

  if(state!=='play'){
    // Фоновая анимация на меню/экране окончания
    return;
  }

  gameTime+=dt;

  // Прогрессия уровня
  let newLevel=Math.floor(gameTime/15)+1;
  if(newLevel!==level){
    level=newLevel;
    spawnInterval=Math.max(0.35,1.8-level*0.13);
    floatTexts.push(new FloatText(W/2,H/2,'УРОВЕНЬ '+level,'#ffe040'));
    shake(0.2);
    updateHUD();
  }

  // Спавн букв
  spawnTimer+=dt;
  if(spawnTimer>=spawnInterval){
    spawnTimer-=spawnInterval;
    letters.push(new FallingLetter());
    // На высоких уровнях — больше букв
    if(level>=3&&Math.random()<0.3)letters.push(new FallingLetter());
    if(level>=6&&Math.random()<0.3)letters.push(new FallingLetter());
  }

  // Тряска экрана
  if(shakeDur>0){
    shakeDur-=dt;
    shakeX=(Math.random()-0.5)*8;
    shakeY=(Math.random()-0.5)*8;
  }else{shakeX=0;shakeY=0}

  ctx.save();
  ctx.translate(shakeX,shakeY);

  // Зона опасности внизу
  let dangerY=H-60;
  let grad=ctx.createLinearGradient(0,dangerY,0,H);
  grad.addColorStop(0,'rgba(255,51,102,0)');
  grad.addColorStop(1,'rgba(255,51,102,0.12)');
  ctx.fillStyle=grad;
  ctx.fillRect(0,dangerY,W,60);
  // Линия
  ctx.strokeStyle='rgba(255,51,102,0.3)';
  ctx.lineWidth=1;
  ctx.setLineDash([8,8]);
  ctx.beginPath();ctx.moveTo(0,dangerY);ctx.lineTo(W,dangerY);ctx.stroke();
  ctx.setLineDash([]);

  // Обновление и отрисовка букв
  for(let i=letters.length-1;i>=0;i--){
    let l=letters[i];
    if(!l.alive){letters.splice(i,1);continue}
    let fell=l.update(dt);
    if(fell){
      // Буква упала — теряем жизнь
      lives--;
      combo=0;
      spawnParticles(l.x,H-20,'#ff3366',8);
      floatTexts.push(new FloatText(l.x,H-60,'ПРОПУСК!','#ff3366'));
      shake(0.2);
      letters.splice(i,1);
      updateHUD();
      if(lives<=0){
        endGame();
        hideTouchKB();
        ctx.restore();
        return;
      }
      continue;
    }
    // Подсветка красным вблизи низа
    if(l.y>dangerY){
      l.draw();// уже рисуется со своим цветом
      // Красная пульсация
      ctx.save();
      ctx.globalAlpha=0.3+Math.sin(gameTime*8)*0.2;
      ctx.font=`bold ${l.size}px sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      let wx=l.x+Math.sin(l.wobble)*l.wobbleAmp;
      ctx.fillStyle='#ff3366';
      ctx.shadowColor='#ff3366';ctx.shadowBlur=20;
      ctx.fillText(l.ch,wx,l.y);
      ctx.restore();
    }else{
      l.draw();
    }
  }

  // Частицы
  for(let i=particles.length-1;i>=0;i--){
    if(particles[i].update(dt)){particles.splice(i,1);continue}
    particles[i].draw();
  }

  // Всплывающие тексты
  for(let i=floatTexts.length-1;i>=0;i--){
    if(floatTexts[i].update(dt)){floatTexts.splice(i,1);continue}
    floatTexts[i].draw();
  }

  ctx.restore();
}

lastTime=performance.now();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
