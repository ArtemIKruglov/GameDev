<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Котик-Змейка</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;width:100vw}
#gameContainer{position:relative;width:100vmin;height:100vmin;max-width:600px;max-height:600px}
canvas{display:block;width:100%;height:100%;border-radius:12px;box-shadow:0 0 40px rgba(255,160,50,0.3),0 0 80px rgba(255,100,0,0.15)}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;border-radius:12px;transition:opacity 0.4s,transform 0.4s;z-index:10}
.overlay.hidden{opacity:0;pointer-events:none;transform:scale(0.95)}
#startScreen{background:radial-gradient(ellipse at center,rgba(255,140,40,0.25) 0%,rgba(10,10,26,0.95) 70%)}
#gameOverScreen{background:radial-gradient(ellipse at center,rgba(255,50,50,0.3) 0%,rgba(10,10,26,0.95) 70%)}
h1{font-size:clamp(28px,7vmin,52px);color:#ffaa33;text-shadow:0 0 20px rgba(255,160,50,0.6),0 2px 4px rgba(0,0,0,0.5);margin-bottom:8px;letter-spacing:2px}
.subtitle{font-size:clamp(14px,3.5vmin,22px);color:#ffdd88;margin-bottom:24px;text-shadow:0 0 10px rgba(255,200,100,0.4)}
.info{font-size:clamp(12px,2.8vmin,18px);color:#ccbbee;line-height:1.8;text-align:center;margin-bottom:20px;padding:0 20px}
.score-display{font-size:clamp(20px,5vmin,36px);color:#ff6644;text-shadow:0 0 15px rgba(255,100,50,0.5);margin:8px 0}
.best-display{font-size:clamp(14px,3vmin,20px);color:#ffcc44;margin:4px 0}
.btn{padding:14px 40px;font-size:clamp(16px,3.5vmin,22px);font-weight:700;border:none;border-radius:50px;cursor:pointer;color:#1a1a2e;transition:transform 0.15s,box-shadow 0.15s;outline:none;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(0.93)}
.btn-start{background:linear-gradient(135deg,#ffaa33,#ff6622);box-shadow:0 4px 20px rgba(255,100,30,0.5)}
.btn-retry{background:linear-gradient(135deg,#ff5544,#ff2244);box-shadow:0 4px 20px rgba(255,50,50,0.5)}
.btn:hover{transform:scale(1.05)}
#mobileControls{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:none;z-index:5;gap:4px;flex-wrap:wrap;width:160px;justify-content:center}
.ctrl-btn{width:48px;height:48px;border-radius:12px;background:rgba(255,170,50,0.2);border:2px solid rgba(255,170,50,0.4);color:#ffaa33;font-size:22px;display:flex;justify-content:center;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.ctrl-btn:active{background:rgba(255,170,50,0.5)}
@media(pointer:coarse){#mobileControls{display:flex}}
.cat-emoji{font-size:clamp(40px,10vmin,70px);margin-bottom:12px;animation:bounce 1s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.5s ease-out}
</style>
</head>
<body>
<div id="gameContainer">
<canvas id="gameCanvas"></canvas>

<div id="startScreen" class="overlay">
<div class="cat-emoji">🐱</div>
<h1>КОТИК-ЗМЕЙКА</h1>
<div class="subtitle">Ешь собачек и расти!</div>
<div class="info">
🖱️ Стрелки / WASD — управление<br>
📱 Свайп — для мобильных<br>
🐶 Съешь собачек — расти длиннее<br>
⚡ Не врезайся в себя и стены!
</div>
<button class="btn btn-start" onclick="startGame()">ИГРАТЬ</button>
</div>

<div id="gameOverScreen" class="overlay hidden">
<h1>МЯУ!</h1>
<div class="subtitle">Котик наелся и устал</div>
<div class="score-display" id="finalScore">0</div>
<div class="best-display" id="bestScore">Лучший: 0</div>
<button class="btn btn-retry" onclick="startGame()">ЕЩЁ РАЗОК</button>
</div>

<div id="mobileControls">
<div class="ctrl-btn" ontouchstart="setDir(0,-1)">⬆</div>
<div class="ctrl-btn" ontouchstart="setDir(-1,0)">⬅</div>
<div class="ctrl-btn" ontouchstart="setDir(1,0)">➡</div>
<div class="ctrl-btn" ontouchstart="setDir(0,1)">⬇</div>
</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GRID = 20;
let cols, rows, cellSize;
let cat=[], dogs=[], direction, nextDirection, score, bestScore = 0, gameRunning, gameLoop, speed, particles=[], shakeTimer, bonusDog, comboCount, lastEatTime, bgStars=[];

function resize() {
  const size = Math.min(window.innerWidth, window.innerHeight, 600);
  canvas.width = size;
  canvas.height = size;
  cellSize = size / GRID;
  cols = GRID;
  rows = GRID;
  if (!bgStars) initStars();
}

function initStars() {
  bgStars = [];
  for (let i = 0; i < 50; i++) {
    bgStars.push({x: Math.random(), y: Math.random(), s: Math.random()*2+1, b: Math.random(), sp: Math.random()*0.5+0.2});
  }
}

function initGame() {
  const cx = Math.floor(cols / 2);
  const cy = Math.floor(rows / 2);
  cat = [{x: cx, y: cy}, {x: cx-1, y: cy}, {x: cx-2, y: cy}];
  direction = {x: 1, y: 0};
  nextDirection = {x: 1, y: 0};
  dogs = [];
  score = 0;
  speed = 140;
  particles = [];
  shakeTimer = 0;
  bonusDog = null;
  comboCount = 0;
  lastEatTime = 0;
  spawnDog();
}

function spawnDog() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows)};
  } while (isOccupied(pos));
  dogs.push(pos);
}

function isOccupied(pos) {
  for (const s of cat) if (s.x === pos.x && s.y === pos.y) return true;
  for (const d of dogs) if (d.x === pos.x && d.y === pos.y) return true;
  if (bonusDog && bonusDog.x === pos.x && bonusDog.y === pos.y) return true;
  return false;
}

function spawnBonus() {
  if (bonusDog || Math.random() > 0.15) return;
  let pos;
  let tries = 0;
  do {
    pos = {x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows), timer: 120, type: 'bonus'};
    tries++;
  } while (isOccupied(pos) && tries < 50);
  if (tries < 50) bonusDog = pos;
}

function setDir(x, y) {
  if (direction.x === -x && direction.y === -y) return;
  if (direction.x === x && direction.y === y) return;
  nextDirection = {x, y};
}

function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 4 + 2;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      size: Math.random() * 4 + 2,
      color: color
    });
  }
}

function update() {
  direction = {...nextDirection};
  const head = {x: cat[0].x + direction.x, y: cat[0].y + direction.y};

  // Проверка столкновений со стенами
  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
    gameOver(); return;
  }

  // Проверка столкновений с собой
  for (let i = 0; i < cat.length; i++) {
    if (head.x === cat[i].x && head.y === cat[i].y) {
      gameOver(); return;
    }
  }

  cat.unshift(head);

  let ate = false;
  // Проверка обычных собачек
  for (let i = dogs.length - 1; i >= 0; i--) {
    if (head.x === dogs[i].x && head.y === dogs[i].y) {
      const px = dogs[i].x * cellSize + cellSize / 2;
      const py = dogs[i].y * cellSize + cellSize / 2;
      addParticles(px, py, '#ff8844', 15);
      addParticles(px, py, '#ffdd44', 10);
      dogs.splice(i, 1);
      score += 10;
      ate = true;
      comboCount++;
      lastEatTime = Date.now();
      speed = Math.max(60, speed - 3);
      shakeTimer = 6;
      spawnDog();
      spawnBonus();
      break;
    }
  }

  // Проверка бонусной собачки
  if (bonusDog && head.x === bonusDog.x && head.y === bonusDog.y) {
    const px = bonusDog.x * cellSize + cellSize / 2;
    const py = bonusDog.y * cellSize + cellSize / 2;
    addParticles(px, py, '#ff44ff', 25);
    addParticles(px, py, '#ffff44', 20);
    addParticles(px, py, '#44ffff', 15);
    score += 50;
    ate = true;
    shakeTimer = 12;
    bonusDog = null;
  }

  if (!ate) {
    cat.pop();
  }

  // Сброс комбо если давно не ел
  if (Date.now() - lastEatTime > 5000) comboCount = 0;

  // Обновление бонусной собачки
  if (bonusDog) {
    bonusDog.timer--;
    if (bonusDog.timer <= 0) bonusDog = null;
  }

  // Обновление частиц
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (shakeTimer > 0) shakeTimer--;
}

function draw() {
  const W = canvas.width;
  const H = canvas.height;

  // Тряска экрана
  ctx.save();
  if (shakeTimer > 0) {
    const intensity = shakeTimer * 1.5;
    ctx.translate(Math.random()*intensity - intensity/2, Math.random()*intensity - intensity/2);
  }

  // Фон
  const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
  bgGrad.addColorStop(0, '#1a1a3e');
  bgGrad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Звёзды на фоне
  const time = Date.now() * 0.001;
  for (const st of bgStars) {
    const bri = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * st.sp + st.b * 10));
    ctx.fillStyle = `rgba(200,180,255,${bri * 0.5})`;
    ctx.beginPath();
    ctx.arc(st.x * W, st.y * H, st.s, 0, Math.PI * 2);
    ctx.fill();
  }

  // Сетка
  ctx.strokeStyle = 'rgba(100,80,150,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= cols; i++) {
    ctx.beginPath(); ctx.moveTo(i * cellSize, 0); ctx.lineTo(i * cellSize, H); ctx.stroke();
  }
  for (let i = 0; i <= rows; i++) {
    ctx.beginPath(); ctx.moveTo(0, i * cellSize); ctx.lineTo(W, i * cellSize); ctx.stroke();
  }

  // Рисуем собачек
  ctx.font = `${cellSize * 0.85}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const d of dogs) {
    ctx.shadowColor = '#ff8844';
    ctx.shadowBlur = 10;
    ctx.fillText('🐶', d.x * cellSize + cellSize/2, d.y * cellSize + cellSize/2 + 1);
    ctx.shadowBlur = 0;
  }

  // Рисуем бонусную собачку
  if (bonusDog) {
    const pulse = 1 + 0.15 * Math.sin(time * 8);
    ctx.save();
    ctx.translate(bonusDog.x * cellSize + cellSize/2, bonusDog.y * cellSize + cellSize/2);
    ctx.scale(pulse, pulse);
    ctx.shadowColor = '#ff44ff';
    ctx.shadowBlur = 20;
    ctx.font = `${cellSize * 0.9}px serif`;
    ctx.fillText('🐕', 0, 1);
    ctx.shadowBlur = 0;
    // Индикатор времени
    const ratio = bonusDog.timer / 120;
    ctx.fillStyle = `hsl(${ratio*120}, 100%, 60%)`;
    ctx.beginPath();
    ctx.arc(0, -cellSize*0.45, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Рисуем котика (тело)
  for (let i = cat.length - 1; i >= 0; i--) {
    const s = cat[i];
    const x = s.x * cellSize;
    const y = s.y * cellSize;
    const t = i / cat.length;

    if (i === 0) {
      // Голова котика
      const headEmoji = direction.x === 1 ? '😺' : direction.x === -1 ? '😺' : direction.y === -1 ? '😺' : '😺';
      ctx.shadowColor = '#ffaa33';
      ctx.shadowBlur = 15;
      ctx.font = `${cellSize}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      ctx.save();
      ctx.translate(x + cellSize/2, y + cellSize/2);
      let angle = 0;
      if (direction.x === -1) angle = Math.PI;
      if (direction.y === -1) angle = -Math.PI/2;
      if (direction.y === 1) angle = Math.PI/2;
      if (direction.x === 1) angle = 0;
      // Не вращаем эмодзи — просто отображаем
      ctx.fillText('🐱', 0, 1);
      ctx.restore();
      ctx.shadowBlur = 0;
    } else if (i === cat.length - 1) {
      // Хвостик
      const bodyHue = 25 + t * 15;
      ctx.fillStyle = `hsl(${bodyHue}, 80%, ${55 - t*15}%)`;
      ctx.shadowColor = `hsl(${bodyHue}, 80%, 50%)`;
      ctx.shadowBlur = 6;
      const pad = cellSize * 0.2;
      ctx.beginPath();
      ctx.arc(x + cellSize/2, y + cellSize/2, (cellSize - pad*2)/2 * 0.7, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Кончик хвоста
      ctx.fillStyle = '#442200';
      ctx.beginPath();
      ctx.arc(x + cellSize/2, y + cellSize/2, (cellSize - pad*2)/2 * 0.35, 0, Math.PI*2);
      ctx.fill();
    } else {
      // Тело
      const bodyHue = 25 + t * 15;
      const lightness = 60 - t * 20;
      ctx.fillStyle = `hsl(${bodyHue}, 85%, ${lightness}%)`;
      ctx.shadowColor = `hsl(${bodyHue}, 85%, 50%)`;
      ctx.shadowBlur = 5;
      const pad = cellSize * 0.15;
      const r = cellSize * 0.15;

      ctx.beginPath();
      ctx.roundRect(x + pad, y + pad, cellSize - pad*2, cellSize - pad*2, r);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Полоски на теле
      if (i % 2 === 0) {
        ctx.fillStyle = `hsl(${bodyHue-5}, 70%, ${lightness - 12}%)`;
        const sp = cellSize * 0.25;
        ctx.fillRect(x + cellSize/2 - sp, y + pad + 1, sp*2, cellSize - pad*2 - 2);
      }
    }
  }

  // Рисуем частицы
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Счёт
  ctx.fillStyle = '#ffdd88';
  ctx.shadowColor = '#ffaa33';
  ctx.shadowBlur = 10;
  ctx.font = `bold ${Math.max(16, cellSize*0.7)}px 'Segoe UI', sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`🍖 ${score}`, 10, 10);

  // Длинна
  ctx.textAlign = 'right';
  ctx.fillText(`🐱 ${cat.length}`, W - 10, 10);

  // Комбо
  if (comboCount >= 2) {
    ctx.textAlign = 'center';
    ctx.fillStyle = `hsl(${(time*200)%360}, 100%, 70%)`;
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 15;
    ctx.font = `bold ${Math.max(14, cellSize*0.6)}px 'Segoe UI', sans-serif`;
    ctx.fillText(`КОМБО x${comboCount}!`, W/2, 10);
  }
  ctx.shadowBlur = 0;

  ctx.restore();
}

function gameStep() {
  if (!gameRunning) return;
  update();
  draw();
  gameLoop = setTimeout(gameStep, speed);
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  resize();
  initGame();
  gameRunning = true;
  if (gameLoop) clearTimeout(gameLoop);
  gameStep();
}

function gameOver() {
  gameRunning = false;
  if (gameLoop) clearTimeout(gameLoop);

  // Частицы взрыва
  const headX = cat[0].x * cellSize + cellSize/2;
  const headY = cat[0].y * cellSize + cellSize/2;
  addParticles(headX, headY, '#ff4444', 30);
  addParticles(headX, headY, '#ffaa33', 20);
  addParticles(headX, headY, '#ffffff', 10);

  // Финальная отрисовка с частицами
  let frames = 0;
  function deathAnim() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
    frames++;
    draw();
    if (frames < 40) requestAnimationFrame(deathAnim);
    else showGameOver();
  }
  deathAnim();
}

function showGameOver() {
  if (score > bestScore) bestScore = score;
  document.getElementById('finalScore').textContent = `${score}`;
  document.getElementById('bestScore').textContent = `🏆 Лучший: ${bestScore}`;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

// Управление клавиатурой
document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': case 'ц': case 'Ц': setDir(0, -1); e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': case 'ы': case 'Ы': setDir(0, 1); e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A': case 'ф': case 'Ф': setDir(-1, 0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': case 'д': case 'Д': setDir(1, 0); e.preventDefault(); break;
  }
  // Пуск при нажатии пробела
  if (e.key === ' ' && !gameRunning) {
    startGame();
    e.preventDefault();
  }
});

// Управление свайпом
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  e.preventDefault();
}, {passive: false});

canvas.addEventListener('touchmove', e => e.preventDefault(), {passive: false});

canvas.addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const minSwipe = 20;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (Math.abs(dx) > minSwipe) setDir(dx > 0 ? 1 : -1, 0);
  } else {
    if (Math.abs(dy) > minSwipe) setDir(0, dy > 0 ? 1 : -1);
  }
});

// Поддержка roundRect
if (typeof CanvasRenderingContext2D !== 'undefined' && !CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
    this.moveTo(x + r.tl, y);
    this.lineTo(x + w - r.tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    this.lineTo(x + w, y + h - r.br);
    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    this.lineTo(x + r.bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    this.lineTo(x, y + r.tl);
    this.quadraticCurveTo(x, y, x + r.tl, y);
    this.closePath();
  };
}

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
